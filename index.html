<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Owner Dashboard</h1>
        
        <div style="text-align: center; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
            <h3>Scan to Order</h3>
            <div id="qrcode" style="display: flex; justify-content: center; margin-top: 15px;"></div>
        </div>

        <button id="shop-toggle">Loading Status...</button>

        <h2>Live Orders</h2>
        <div id="orders-container">
            <p style="text-align: center;">Waiting for orders...</p>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
