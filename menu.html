<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Menu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="closed-message">
            <h2>Shop is Closed 🚫</h2>
            <p>Sorry, we are not accepting orders right now. Please try again later.</p>
        </div>

        <div id="menu-container">
            <h1>Shop Menu</h1>
            <p style="text-align: center; margin-bottom: 20px;">Select your items and tap submit.</p>
            
            <div id="product-list">
                </div>

            <button id="submit-order">Submit Order</button>
        </div>
    </div>

    <script type="module" src="customer.js"></script>
</body>
</html>
