<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintShop Document Upload Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 font-sans min-h-screen text-slate-100 flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl space-y-5">
        <div class="text-center">
            <div class="inline-flex p-3 bg-blue-500/10 text-blue-400 rounded-2xl border border-blue-500/20 mb-2 font-bold text-sm">
                🏬 Connected to Shop Terminal
            </div>
            <h1 class="text-2xl font-black text-slate-100">Upload File to Print</h1>
            <p class="text-xs text-slate-400 mt-1">Your file will drop instantly onto the shop terminal counter screen.</p>
        </div>

        <!-- File Upload Dropzone Container Box -->
        <div class="border-2 border-dashed border-slate-700 hover:border-blue-400/50 rounded-2xl p-6 text-center bg-slate-950/40 hover:bg-slate-950/80 transition cursor-pointer relative group">
            <input type="file" id="customerFileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="handleCustomerFileSelection()">
            <div id="uploadFormPrompt">
                <div class="text-4xl mb-2 group-hover:scale-110 transition transform">📄</div>
                <p class="text-slate-200 font-bold text-sm">Tap to Choose File</p>
                <p class="text-xs text-slate-500 mt-0.5">PDFs, Documents, Photos, Images</p>
            </div>
            <div id="uploadFileSelectionDisplay" class="hidden text-xs font-bold text-blue-400 bg-blue-950/30 border border-blue-900/40 p-3 rounded-xl break-all"></div>
        </div>

        <!-- Custom Requirements/Notes Box Section -->
        <div class="space-y-1.5">
            <label class="block text-xs font-bold uppercase tracking-wide text-slate-400">Print Instructions (Optional):</label>
            <textarea id="customerInstructionsInput" rows="3" placeholder="Example: 3 copies, double-sided, color layout..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition resize-none"></textarea>
        </div>

        <button onclick="dispatchFileToShopQueue()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-slate-950 font-black py-4 px-4 rounded-xl shadow-lg transition transform active:scale-95 text-md tracking-wide uppercase">
            🚀 Send to Printer Counter
        </button>

        <p id="transmissionStatusLog" class="text-center text-xs font-semibold text-slate-500 tracking-wide"></p>
    </div>

    <script>
        const CLOUD_API_ENDPOINT = "https://api.restful-api.dev/objects";
        const URL_ARGS = new URLSearchParams(window.location.search);
        const masterQueueChannelId = URL_ARGS.get('shop_inbox');

        window.addEventListener('DOMContentLoaded', () => {
            if (!masterQueueChannelId) {
                document.body.innerHTML = `<div class="text-center p-8 font-bold text-red-400">❌ Error: Missing configuration signature token. Please scan the owner's desktop QR code again.</div>`;
            }
        });

        function handleCustomerFileSelection() {
            const inputReference = document.getElementById('customerFileInput');
            const interactionPrompt = document.getElementById('uploadFormPrompt');
            const labelOutputContainer = document.getElementById('uploadFileSelectionDisplay');

            if (inputReference.files.length > 0) {
                interactionPrompt.classList.add('hidden');
                labelOutputContainer.innerText = `📎 Attached: ${inputReference.files[0].name} (${formatBytesMetric(inputReference.files[0].size)})`;
                labelOutputContainer.classList.remove('hidden');
            }
        }

        async function dispatchFileToShopQueue() {
            const nativeFileInputNode = document.getElementById('customerFileInput');
            const customNotesInputNode = document.getElementById('customerInstructionsInput');
            const traceLogOutput = document.getElementById('transmissionStatusLog');

            if (!nativeFileInputNode.files.length) {
                alert("Please tap above and pick a document or photo first!");
                return;
            }

            traceLogOutput.innerText = "⏳ Uploading file structure data stream...";
            traceLogOutput.className = "text-center text-xs font-semibold text-blue-400 animate-pulse uppercase tracking-wider";

            const fileAttachment = nativeFileInputNode.files[0];
            const datasetPayloadBuffer = new FormData();
            datasetPayloadBuffer.append('file', fileAttachment);

            try {
                const fileCdnResponse = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: datasetPayloadBuffer
                });
                const fileCdnParsedData = await fileCdnResponse.json();

                if (fileCdnParsedData.status === "success") {
                    const structuralRawUrl = fileCdnParsedData.data.url;
                    const functionalDownloadRoute = structuralRawUrl.replace("tmpfiles.org/", "tmpfiles.org/dl/");

                    traceLogOutput.innerText = "🔗 Syncing instructions with shop monitor dashboard...";

                    const currentQueueResponse = await fetch(`${CLOUD_API_ENDPOINT}/${masterQueueChannelId}`);
                    const currentQueueData = await currentQueueResponse.json();
                    let updatedQueue = (currentQueueData.data && Array.isArray(currentQueueData.data.queue)) ? currentQueueData.data.queue : [];

                    const fileMetadataPayload = {
                        fileName: fileAttachment.name,
                        fileSize: formatBytesMetric(fileAttachment.size),
                        fileDownloadUrl: functionalDownloadRoute,
                        instructions: customNotesInputNode.value.trim(),
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };

                    updatedQueue.push(fileMetadataPayload);

                    await fetch(`${CLOUD_API_ENDPOINT}/${masterQueueChannelId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: "PrintShop_Terminal_System",
                            data: { queue: updatedQueue }
                        })
                    });

                    traceLogOutput.innerText = "✅ SENT SUCCESSFUL! CHECK MONITOR WITH THE CASHIER.";
                    traceLogOutput.className = "text-center text-xs font-black text-emerald-400 tracking-wider bg-emerald-950/40 p-3 rounded-xl border border-emerald-900/60";
                    
                    nativeFileInputNode.value = "";
                    customNotesInputNode.value = "";
                    document.getElementById('uploadFileSelectionDisplay').classList.add('hidden');
                    document.getElementById('uploadFormPrompt').classList.remove('hidden');
                } else { throw new Error("Server error."); }
            } catch (err) {
                console.error(err);
                traceLogOutput.innerText = "❌ SUBMISSION FAULT. TRY SENDING IT AGAIN.";
                traceLogOutput.className = "text-center text-xs font-black text-red-400 tracking-wider";
            }
        }

        function formatBytesMetric(bytesCount, precisionDigits = 2) {
            if (bytesCount === 0) return '0 Bytes';
            const baseScaleUnit = 1024;
            const sizingDenominations = ['Bytes', 'KB', 'MB', 'GB'];
            const calculatedExponentIndex = Math.floor(Math.log(bytesCount) / Math.log(baseScaleUnit));
            return parseFloat((bytesCount / Math.pow(baseScaleUnit, calculatedExponentIndex)).toFixed(precisionDigits)) + ' ' + sizingDenominations[calculatedExponentIndex];
        }
    </script>
</body>
</html>
